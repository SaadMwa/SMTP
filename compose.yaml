services:
  haraka:
    build:
      context: ./haraka
    container_name: smtp-haraka
    depends_on:
      mailhog:
        condition: service_started
    env_file:
      - ./.env.example
    environment:
      SMTP_LISTEN_PORT: ${SMTP_LISTEN_PORT:-2525}
      UPSTREAM_SMTP_HOST: ${UPSTREAM_SMTP_HOST:-mailhog}
      UPSTREAM_SMTP_PORT: ${UPSTREAM_SMTP_PORT:-1025}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "0.0.0.0:${SMTP_HOST_PORT:-2525}:${SMTP_LISTEN_PORT:-2525}"
    volumes:
      - ./haraka/config:/app/config
      - ./haraka/entrypoint.sh:/app/entrypoint.sh:ro
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:v1.0.1
    platform: linux/amd64
    container_name: smtp-mailhog
    ports:
      - "0.0.0.0:1025:1025"
      - "0.0.0.0:8025:8025"
    restart: unless-stopped

  # Optional LLM stack — NOT started by default (see docker-compose.override.yaml).
  # Enable with: docker compose --profile llm up --build
  ollama:
    profiles: ["llm"]
    image: ollama/ollama:0.1.48
    container_name: smtp-ollama
    ports:
      - "0.0.0.0:11434:11434"
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ollama-warmup:
    profiles: ["llm"]
    image: curlimages/curl:8.8.0
    container_name: smtp-ollama-warmup
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_PRIMARY_MODEL: ${OLLAMA_PRIMARY_MODEL:-tinyllama}
      OLLAMA_FALLBACK_MODEL: ${OLLAMA_FALLBACK_MODEL:-phi}
    command:
      - sh
      - -c
      - |
        set -eu
        curl -fsS "$${OLLAMA_BASE_URL}/api/pull" -d "{\"name\":\"$${OLLAMA_PRIMARY_MODEL}\"}"
        curl -fsS "$${OLLAMA_BASE_URL}/api/pull" -d "{\"name\":\"$${OLLAMA_FALLBACK_MODEL}\"}" || true
    restart: "no"

  prometheus:
    profiles: ["metrics"]
    image: prom/prometheus:v2.52.0
    container_name: smtp-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "0.0.0.0:9091:9090"
    depends_on:
      - haraka
    restart: unless-stopped

volumes:
  ollama:
