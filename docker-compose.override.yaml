# Default stack: keyword classifier only — no Ollama container.
# Ollama is disabled because the bundled image crashes on many hosts
# (e.g. "exec /bin/ollama: input/output error" on Windows Docker Desktop).
#
# Optional LLM mode: docker compose --profile llm up --build

services:
  ollama:
    profiles: ["llm"]

  ollama-warmup:
    profiles: ["llm"]

  haraka:
    depends_on:
      mailhog:
        condition: service_started
