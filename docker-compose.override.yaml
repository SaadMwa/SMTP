services:
  # Disable the Ollama container entirely
  ollama:
    deploy:
      replicas: 0
  
  # Disable the warmup container
  ollama-warmup:
    deploy:
      replicas: 0
  
  # Configure Haraka to use your Windows Ollama
  haraka:
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_PRIMARY_MODEL=phi
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_MODEL=phi
      - UPSTREAM_SMTP_HOST=mailhog
      - UPSTREAM_SMTP_PORT=1025
      - UPSTREAM_HOST=mailhog
      - UPSTREAM_PORT=1025
    extra_hosts:
      - "host.docker.internal:host-gateway"
